<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Bot - AI Chat Assistant</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="bot-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="header-text">
                    <h1>Voice Bot</h1>
                    <p>Your AI Chat Assistant</p>
                </div>
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text">Online</span>
                </div>
            </div>
        </header>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message bot-message">
                    <div class="message-avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="message-content">
                        <div class="message-bubble">
                            Welcome! I'm Voice Bot, your AI assistant. You can type your questions or use the microphone to talk to me. Try asking "What can you do?" to get started!
                        </div>
                        <div class="message-time" id="welcomeTime"></div>
                    </div>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <div class="message bot-message">
                    <div class="message-avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="message-content">
                        <div class="message-bubble typing">
                            <div class="typing-dots">
                                <span></span>
                                <span></span>
                                <span></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="voice-status" id="voiceStatus">
                <i class="fas fa-microphone-slash"></i>
                <span>Click microphone to start voice input</span>
            </div>
            
            <div class="input-wrapper">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="Type your message or use voice..." 
                        autocomplete="off"
                    >
                    <button id="voiceButton" class="voice-btn" title="Voice Input">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <button id="sendButton" class="send-btn" title="Send Message">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>

            <div class="quick-actions">
                <button class="quick-btn" data-message="Hello">👋 Hello</button>
                <button class="quick-btn" data-message="What can you do">❓ What can you do</button>
                <button class="quick-btn" data-message="Tell me a joke">😄 Tell me a joke</button>
                <button class="quick-btn" data-message="What time is it">🕐 Time</button>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <p>Processing your voice...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
